name: LaunchGuard
version: "${version}"
main: com.serverpulse.launchguard.LaunchGuardPlugin
api-version: "1.20"
description: Read-only pre-launch checks for Minecraft servers.
author: ServerPulse

commands:
  launchguard:
    description: Run pre-launch health checks.
    aliases: [lg, preflight]
    permission: launchguard.use
    usage: /launchguard [help|run|plugins|reload|version]

permissions:
  launchguard.use:
    description: Allows use of the /launchguard command.
    default: op
  launchguard.run:
    description: Allows running pre-launch checks.
    default: op
  launchguard.reload:
    description: Allows reloading LaunchGuard configuration.
    default: op
  launchguard.plugins:
    description: Allows viewing the read-only plugin inventory and dependency report.
    default: op
    children:
      launchguard.use: true
  launchguard.admin:
    description: Full administrative access to LaunchGuard.
    default: op
    children:
      launchguard.use: true
      launchguard.run: true
      launchguard.reload: true
      launchguard.plugins: true
