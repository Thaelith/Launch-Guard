checks:
  plugins:
    enabled: true
    required:
      - Vault
      - LuckPerms
      - PlaceholderAPI
      - Essentials
  commands:
    enabled: true
    required:
      - spawn
      - warp
      - kit
      - shop
  worlds:
    enabled: true
    required:
      - world
      - world_nether
      - world_the_end
  locations:
    enabled: true
    entries:
      spawn:
        world: world
        x: 0
        y: 80
        z: 0
        safe: true
      crates:
        world: world
        x: 120
        y: 75
        z: -30
        safe: true
  permissions:
    enabled: true
    nodes:
      shouldExist:
        - essentials.spawn
        - essentials.warp
        - essentials.kits.starter
      dangerous:
        - minecraft.command.op
        - bukkit.command.stop
        - essentials.ban
