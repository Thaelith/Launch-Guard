# Example checks.yml for a Lobby / Hub Minecraft server.
# Copy to plugins/LaunchGuard/checks.yml and adjust for your server.

checks:
  plugins:
    enabled: true
    required:
      - Vault
      - LuckPerms
      - PlaceholderAPI
      - Citizens
      - HolographicDisplays
      - TAB

  commands:
    enabled: true
    required:
      - spawn
      - hub
      - servers
      - selector

  worlds:
    enabled: true
    required:
      - lobby
      - world

  locations:
    enabled: true
    entries:
      spawn:
        world: lobby
        x: 0
        y: 100
        z: 0
        safe: true
      npc_hub:
        world: lobby
        x: 2
        y: 100
        z: 3
        safe: true
      portal_survival:
        world: lobby
        x: 20
        y: 101
        z: 0
        safe: true

  permissions:
    enabled: true
    nodes:
      shouldExist:
        - essentials.spawn
        - citizens.npc.select
      dangerous:
        - minecraft.command.op
        - bukkit.command.stop
