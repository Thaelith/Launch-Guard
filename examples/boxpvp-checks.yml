# Example checks.yml for a BoxPvP Minecraft server.
# Copy to plugins/LaunchGuard/checks.yml and adjust for your server.

checks:
  plugins:
    enabled: true
    required:
      - Vault
      - LuckPerms
      - PlaceholderAPI
      - CombatLogX
      - AntiCheat

  commands:
    enabled: true
    required:
      - spawn
      - kit
      - stats
      - duel
      - party
      - shop

  worlds:
    enabled: true
    required:
      - world
      - pvp_world

  locations:
    enabled: true
    entries:
      spawn:
        world: world
        x: 0
        y: 90
        z: 0
        safe: true
      kit_room:
        world: pvp_world
        x: 50
        y: 70
        z: 50
        safe: true
      arena_center:
        world: pvp_world
        x: 0
        y: 65
        z: 100
        safe: false

  permissions:
    enabled: true
    nodes:
      shouldExist:
        - essentials.spawn
        - combatlogx.notify
      dangerous:
        - minecraft.command.op
        - bukkit.command.stop
        - bukkit.command.ban
